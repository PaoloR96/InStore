worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=30s; # DNS per Docker

    server {
        listen 80;
        server_name instore.puntoitstore.it;

        # Rotte per i rivenditori
        location ~ ^/api/rivenditori/([^/]+)/insprodotti$ {
            proxy_pass http://application-core:8080/api/rivenditori/$1/insprodotti;  # Inoltra alla porta 8080 del container
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/rivenditori/([^/]+)/listaprodotti$ {
            proxy_pass http://application-core:8080/api/rivenditori/$1/listaprodotti;  # Inoltra alla porta 8080 del container
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rotte API generali
        location /api {
            proxy_pass http://application-core:8080/api;  # Inoltra tutte le altre richieste API
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # File statici
        location /static/ {
            alias /usr/share/nginx/html/static/;
        }

        # Errori personalizzati
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Supporto per applicazioni frontend (es. React, Angular)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
